name: NodeJS with Webpack

on:
  push:
    branches: [ "master", "develop" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 24.x ]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build
        run: |
          npm install
          npx webpack

      - name: Set server dir
        run: |
          if [ "${GITHUB_REF}" == "refs/heads/master" ]; then
            echo "SERVER_DIR=/quiothello.it/public_html/" >> $GITHUB_ENV
          else
            echo "SERVER_DIR=/test.quiothello.it/public_html/" >> $GITHUB_ENV
          fi

      - name: Duplicate icons for test environment
        if: github.ref != 'refs/heads/master'
        run: |
          cp dist/icons/quiothello2026-test-512.png dist/icons/quiothello2026-512.png
          cp dist/icons/quiothello2026-test-192.png dist/icons/quiothello2026-192.png
          cp dist/icons/quiothello2026-test-180.png dist/icons/quiothello2026-180.png

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ env.SERVER_DIR }}
